name: Bug report
description: Report a problem with the workspace or its scripts
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can an agent reproduce this?
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, shell (PowerShell/bash)
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I did not hardcode absolute paths (e.g. C:\Users\...)
        - label: No personal data (novel/gbrain/memory) or secrets committed
