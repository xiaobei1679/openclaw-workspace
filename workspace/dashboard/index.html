<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队自我成长系统 · 仪表盘</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --card-hover: #1a2745;
  --border: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8892a6;
  --accent: #e94560;
  --green: #4ecca3;
  --yellow: #f0a500;
  --red: #e94560;
  --blue: #4ea8de;
  --purple: #a06cd5;
}
[data-theme="light"] {
  --bg: #f0f2f5;
  --card: #ffffff;
  --card-hover: #f5f7fa;
  --border: #d0d7e2;
  --text: #1a1a2e;
  --text-dim: #6b7280;
  --accent: #e94560;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

/* ===== Animations ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes glow {
  0%, 100% { box-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
  50% { box-shadow: 0 0 15px currentColor, 0 0 30px currentColor, 0 0 45px currentColor; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes flashHighlight {
  0% { background: rgba(78,168,222,0.4); }
  100% { background: rgba(15,52,96,0.3); }
}
@keyframes barGrow {
  from { width: 0; }
}
@keyframes slideDown {
  from { max-height: 0; opacity: 0; }
  to { max-height: 2000px; opacity: 1; }
}
@keyframes slideUp {
  from { max-height: 2000px; opacity: 1; }
  to { max-height: 0; opacity: 0; }
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.6; }
}

/* ===== Top Bar ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--card);
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background 0.3s, border-color 0.3s;
}
.topbar-left { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.topbar h1 { font-size: 20px; font-weight: 600; white-space: nowrap; }
.health-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  animation: glow 2s ease-in-out infinite;
}
.health-green { background: rgba(78,204,163,0.15); color: var(--green); border: 1px solid var(--green); }
.health-yellow { background: rgba(240,165,0,0.15); color: var(--yellow); border: 1px solid var(--yellow); }
.health-red { background: rgba(233,69,96,0.15); color: var(--red); border: 1px solid var(--red); }
.health-dot {
  width: 8px; height: 8px; border-radius: 50%;
  animation: dotPulse 1.5s infinite;
}
.countdown-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: rgba(78,168,222,0.12);
  color: var(--blue);
  border: 1px solid rgba(78,168,222,0.3);
}
.topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.topbar-time { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
.btn-refresh {
  background: var(--border);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.btn-refresh:hover { background: var(--accent); border-color: var(--accent); }
.btn-refresh.spinning .btn-icon { animation: spin 0.6s linear; display: inline-block; }
.btn-icon { display: inline-block; }
.btn-theme {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.btn-theme:hover { color: var(--yellow); border-color: var(--yellow); }

/* ===== Search ===== */
.search-wrap {
  padding: 12px 24px 0;
}
.search-box {
  width: 100%;
  max-width: 500px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--blue); }
.search-box::placeholder { color: var(--text-dim); }

/* ===== Grid Layout ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 16px;
  padding: 16px 24px 24px;
}

/* ===== Panel Card ===== */
.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.3s, background 0.3s, opacity 0.3s, transform 0.3s;
  animation: fadeInUp 0.5s ease both;
}
.panel:nth-child(1) { animation-delay: 0.05s; }
.panel:nth-child(2) { animation-delay: 0.1s; }
.panel:nth-child(3) { animation-delay: 0.15s; }
.panel:nth-child(4) { animation-delay: 0.2s; }
.panel:nth-child(5) { animation-delay: 0.25s; }
.panel:nth-child(6) { animation-delay: 0.3s; }
.panel:nth-child(7) { animation-delay: 0.35s; }
.panel:nth-child(8) { animation-delay: 0.4s; }
.panel:hover { border-color: rgba(78,168,222,0.3); }
.panel.hidden { display: none; }
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid rgba(15,52,96,0.5);
  transition: background 0.2s;
}
[data-theme="light"] .panel-header { border-bottom-color: rgba(208,215,226,0.5); }
.panel-header:hover { background: var(--card-hover); }
.panel-title {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-icon { font-size: 18px; }
.panel-toggle {
  color: var(--text-dim);
  font-size: 12px;
  transition: transform 0.3s;
}
.panel.collapsed .panel-toggle { transform: rotate(-90deg); }
.panel.collapsed .panel-body { display: none; }
.panel-body { padding: 18px; }

/* ===== Stat Row ===== */
.stat-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.stat-box {
  flex: 1;
  min-width: 72px;
  background: rgba(15,52,96,0.3);
  border-radius: 8px;
  padding: 12px 8px;
  text-align: center;
  transition: background 0.3s;
}
[data-theme="light"] .stat-box { background: rgba(0,0,0,0.04); }
.stat-box.flash { animation: flashHighlight 0.8s ease; }
.stat-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-green { color: var(--green); }
.stat-yellow { color: var(--yellow); }
.stat-red { color: var(--red); }
.stat-blue { color: var(--blue); }
.stat-purple { color: var(--purple); }

/* ===== CSS Bar Chart ===== */
.bar-chart { margin-top: 8px; }
.bar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.bar-label { width: 80px; font-size: 12px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
.bar-track {
  flex: 1;
  height: 20px;
  background: rgba(15,52,96,0.4);
  border-radius: 4px;
  overflow: hidden;
}
[data-theme="light"] .bar-track { background: rgba(0,0,0,0.06); }
.bar-fill {
  height: 100%;
  border-radius: 4px;
  animation: barGrow 0.8s ease;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  transition: width 0.8s ease;
}

/* ===== CSS Pie Chart ===== */
.pie-chart-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 8px 0;
}
.pie-chart {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.pie-chart::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--card);
}
.pie-legend { font-size: 12px; }
.pie-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.pie-legend-dot {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
}

/* ===== CSS Radar Chart ===== */
.radar-wrap {
  display: flex;
  justify-content: center;
  margin: 8px 0;
}
.radar-chart {
  width: 140px;
  height: 140px;
  position: relative;
}

/* ===== CSS Line Chart ===== */
.line-chart-wrap {
  margin: 8px 0;
  overflow-x: auto;
}
.line-chart {
  height: 80px;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  min-width: 200px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.line-bar {
  flex: 1;
  min-width: 8px;
  border-radius: 3px 3px 0 0;
  transition: height 0.5s ease, background 0.3s;
  position: relative;
}
.line-bar:hover { opacity: 0.8; }
.line-bar::after {
  content: attr(data-val);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ===== CSS Timeline ===== */
.timeline-wrap {
  margin: 8px 0;
  position: relative;
  padding-left: 8px;
}
.timeline-axis {
  height: 28px;
  display: flex;
  align-items: center;
  position: relative;
}
.timeline-line {
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 2px;
  background: var(--border);
}
.timeline-dot {
  position: absolute;
  top: 50%;
  width: 8px; height: 8px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: transform 0.2s;
}
.timeline-dot:hover { transform: translate(-50%, -50%) scale(1.5); z-index: 5; }
.timeline-dot::after {
  content: attr(data-label);
  position: absolute;
  bottom: 140%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
}
.timeline-dot:hover::after { opacity: 1; }
.timeline-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ===== Check List ===== */
.check-list { list-style: none; }
.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(15,52,96,0.3);
  font-size: 13px;
}
[data-theme="light"] .check-item { border-bottom-color: rgba(208,215,226,0.4); }
.check-item:last-child { border-bottom: none; }
.check-icon { font-size: 16px; flex-shrink: 0; }
.check-text { flex: 1; }
.check-detail { color: var(--text-dim); font-size: 12px; }

/* ===== Agent List ===== */
.agent-list { list-style: none; }
.agent-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: 13px;
  transition: background 0.2s;
}
.agent-item:hover { background: rgba(15,52,96,0.3); }
[data-theme="light"] .agent-item:hover { background: rgba(0,0,0,0.04); }
.agent-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.agent-active { background: var(--green); box-shadow: 0 0 6px var(--green); }
.agent-ondemand { background: var(--yellow); }
.agent-dormant { background: var(--text-dim); opacity: 0.5; }
.agent-name { flex: 1; font-weight: 500; }
.agent-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(15,52,96,0.5);
  color: var(--text-dim);
}
[data-theme="light"] .agent-tag { background: rgba(0,0,0,0.06); }
.agent-activity { font-size: 11px; color: var(--text-dim); }

/* ===== Cron List ===== */
.cron-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(15,52,96,0.3);
  font-size: 13px;
}
[data-theme="light"] .cron-item { border-bottom-color: rgba(208,215,226,0.4); }
.cron-item:last-child { border-bottom: none; }
.cron-name { flex: 1; }
.cron-time { color: var(--text-dim); font-size: 12px; }
.cron-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.cron-ok { background: rgba(78,204,163,0.15); color: var(--green); }
.cron-warn { background: rgba(240,165,0,0.15); color: var(--yellow); }
.cron-error { background: rgba(233,69,96,0.15); color: var(--red); }
.cron-unknown { background: rgba(136,146,166,0.15); color: var(--text-dim); }

/* ===== Patterns List ===== */
.pattern-item {
  background: rgba(15,52,96,0.2);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
  font-size: 13px;
}
[data-theme="light"] .pattern-item { background: rgba(0,0,0,0.04); }
.pattern-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.pattern-category { font-weight: 600; }
.pattern-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 8px;
  background: rgba(15,52,96,0.5);
  color: var(--text-dim);
}
[data-theme="light"] .pattern-badge { background: rgba(0,0,0,0.08); }
.pattern-text { color: var(--text-dim); font-size: 12px; line-height: 1.5; }

/* ===== KBI Item ===== */
.kbi-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(15,52,96,0.2);
  font-size: 13px;
}
[data-theme="light"] .kbi-item { border-bottom-color: rgba(208,215,226,0.3); }
.kbi-item:last-child { border-bottom: none; }
.kbi-id { font-family: monospace; color: var(--blue); font-size: 12px; width: 160px; flex-shrink: 0; }
.kbi-roi {
  font-weight: 700;
  width: 40px;
  text-align: center;
  flex-shrink: 0;
}
.kbi-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.kbi-note { color: var(--text-dim); font-size: 12px; flex: 1; }

/* ===== Loading / Error ===== */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
  font-size: 14px;
}
.error-msg {
  text-align: center;
  padding: 20px;
  color: var(--red);
  font-size: 13px;
}

/* ===== Section Subtitle ===== */
.section-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 12px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(15,52,96,0.3);
}
[data-theme="light"] .section-subtitle { border-bottom-color: rgba(208,215,226,0.4); }

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 16px 24px;
  font-size: 12px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
}

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; padding: 12px; }
  .topbar { flex-direction: column; gap: 10px; padding: 12px; }
  .topbar-left { justify-content: center; }
  .topbar-right { justify-content: center; }
  .search-wrap { padding: 8px 12px 0; }
  .stat-value { font-size: 22px; }
  .kbi-id { width: 100px; }
}
@media (max-width: 500px) {
  .topbar h1 { font-size: 16px; }
  .panel-header { padding: 12px 14px; }
  .panel-body { padding: 14px; }
  .stat-box { min-width: 60px; padding: 8px 4px; }
  .stat-value { font-size: 20px; }
  .bar-label { width: 60px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>🧬 团队自我成长系统</h1>
    <span id="healthBadge" class="health-badge health-yellow">
      <span class="health-dot" style="background:var(--yellow)"></span>
      <span id="healthText">检测中…</span>
    </span>
    <span class="countdown-badge" id="countdownBadge">⏳ 下次刷新: 60s</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-time" id="currentTime">--:--:--</span>
    <span class="topbar-time" id="lastHeartbeat">心跳: --</span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData(true)"><span class="btn-icon">🔄</span> 刷新</button>
    <button class="btn-refresh" onclick="window.open('file:///C:/Users/Administrator/.qclaw/workspace/HEARTBEAT.md')">📋 心跳</button>
    <button class="btn-refresh" onclick="window.open('file:///C:/Users/Administrator/.qclaw/workspace/MEMORY.md')">🧠 记忆</button>
    <button class="btn-refresh" onclick="window.open('file:///C:/Users/Administrator/.qclaw/workspace/TOOLS.md')">🛠 工具</button>
    <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="切换主题">🌙</button>
  </div>
</div>

<div class="search-wrap">
  <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索面板标题…" oninput="filterPanels()">
</div>

<div class="grid" id="grid">
  <!-- Panel 1: Auto-Heal -->
  <div class="panel" id="panel-heal" data-title="自愈状态">
    <div class="panel-header" onclick="togglePanel('panel-heal')">
      <span class="panel-title"><span class="panel-icon">🔧</span>自愈状态</span>
      <span class="panel-toggle">▼</span>
    </div>
    <div class="panel-body" id="healBody">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <!-- Panel 2: Experience Pool -->
  <div class="panel" id="panel-exp" data-title="经验池">
    <div class="panel-header" onclick="togglePanel('panel-exp')">
      <span class="panel-title"><span class="panel-icon">💡</span>经验池</span>
      <span class="panel-toggle">▼</span>
    </div>
    <div class="panel-body" id="expBody">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <!-- Panel 3: Creation Feedback -->
  <div class="panel" id="panel-feedback" data-title="创作反馈">
    <div class="panel-header" onclick="togglePanel('panel-feedback')">
      <span class="panel-title"><span class="panel-icon">📝</span>创作反馈</span>
      <span class="panel-toggle">▼</span>
    </div>
    <div class="panel-body" id="feedbackBody">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <!-- Panel 4: Skill Discovery -->
  <div class="panel" id="panel-skill" data-title="技能发现">
    <div class="panel-header" onclick="togglePanel('panel-skill')">
      <span class="panel-title"><span class="panel-icon">🔍</span>技能发现</span>
      <span class="panel-toggle">▼</span>
    </div>
    <div class="panel-body" id="skillBody">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <!-- Panel 5: KBI Tracker -->
  <div class="panel" id="panel-kbi" data-title="KBI追踪">
    <div class="panel-header" onclick="togglePanel('panel-kbi')">
      <span class="panel-title"><span class="panel-icon">📊</span>KBI追踪</span>
      <span class="panel-toggle">▼</span>
    </div>
    <div class="panel-body" id="kbiBody">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <!-- Panel 6: Cron Tasks -->
  <div class="panel" id="panel-cron" data-title="Cron任务状态">
    <div class="panel-header" onclick="togglePanel('panel-cron')">
      <span class="panel-title"><span class="panel-icon">⏰</span>Cron任务状态</span>
      <span class="panel-toggle">▼</span>
    </div>
    <div class="panel-body" id="cronBody">
      <div class="loading">加载中…</div>
    </div>

    document.getElementById('countdownBadge').textContent = `⏳ 下次刷新: ${countdown}s`;
  }, 1000);
}

// ======== Count-Up Animation ========
function animateCount(el, target, duration) {
  const isStr = typeof target === 'string';
  if (isStr && isNaN(parseInt(target))) {
    el.textContent = target;
    return;
  }
  const num = parseInt(target);
  if (isNaN(num)) { el.textContent = target; return; }
  const start = 0;
  const startTime = performance.now();
  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const val = Math.round(start + (num - start) * eased);
    el.textContent = isStr ? val + (target.replace(/[\d-]/g, '') || '') : val;
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

  html += `<div class="pie-chart-wrap">

  html += '<div class="section-subtitle">分类分布</div>';

  let ci = 0;
  for (const [cat, count] of Object.entries(exp.byCategory || {})) {

      <div class="bar-track"><div class="bar-fill" style="width:0;background:${color};" data-width="${pct}">${count}</div></div>

  const sd = data.panels.skillDiscovery;

  let html = '<div class="stat-row" id="skStats"></div>';
  if (sd.lastScan) {
    html += `<div style="font-size:12px;color:var(--text-dim);">上次扫描: ${sd.lastScan}</div>`;
  } else {
    html += `<div style="font-size:12px;color:var(--text-dim);">尚未执行扫描（每周日心跳触发）</div>`;
  }
  const se = data.panels.skillEvolution;
  if (se && se.proposals) {
    html += '<div class="section-subtitle">Skill自进化提案</div>';
    se.proposals.forEach(p => {
      const statusIcon = p.status === 'applied' ? '✅' : p.status === 'pending' ? '⏳' : '❌';
      html += `<div class="check-item" style="padding:6px 0;">
        <span class="check-icon">${statusIcon}</span>
        <div class="check-text">${p.pattern_key}<div class="check-detail">风险: ${p.risk} · 状态: ${p.status}</div></div>
      </div>`;
    });
  }
  body.innerHTML = html;

  // Animate stats
  const statsContainer = document.getElementById('skStats');
  const stats = [
    { val: sd.pending + sd.verified, label: '发现', cls: 'stat-blue' },
    { val: sd.pending, label: '验证中', cls: 'stat-yellow' },
    { val: sd.integrated, label: '已集成', cls: 'stat-green' },
    { val: sd.rejected, label: '已拒绝', cls: 'stat-red' }
  ];
  statsContainer.innerHTML = stats.map((s, i) =>
    `<div class="stat-box"><div class="stat-value ${s.cls}" data-target="${s.val}">0</div><div class="stat-label">${s.label}</div></div>`
  ).join('');
  statsContainer.querySelectorAll('.stat-value').forEach(el => {
    animateCount(el, el.dataset.target, 800);
  });
}

function renderKBI(data) {
  const body = document.getElementById('kbiBody');
  const kbi = data.panels.kbi;
  if (!kbi) { body.innerHTML = '<div class="error-msg">数据不可用</div>'; return; }

  let html = '<div class="stat-row" id="kbiStats"></div>';

  // CSS Radar/Doughnut Chart - ROI distribution
  html += '<div class="section-subtitle">ROI分布</div>';
  const items = kbi.items || [];
  const highRoi = items.filter(i => i.roi >= 100).length;
  const midRoi = items.filter(i => i.roi >= 60 && i.roi < 100).length;
  const lowRoi = items.filter(i => i.roi < 60).length;
  const totalKbi = items.length || 1;
  const pHigh = (highRoi / totalKbi) * 100;
  const pMid = (midRoi / totalKbi) * 100;
  const pLow = (lowRoi / totalKbi) * 100;
  html += `<div class="pie-chart-wrap">
    <div class="pie-chart" style="background: conic-gradient(var(--green) 0% ${pHigh}%, var(--yellow) ${pHigh}% ${pHigh+pMid}%, var(--red) ${pHigh+pMid}% 100%);"></div>
    <div class="pie-legend">
      <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--green);"></span>ROI≥100 (${highRoi})</div>
      <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--yellow);"></span>ROI 60-99 (${midRoi})</div>
      <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--red);"></span>ROI<60 (${lowRoi})</div>
    </div>
  </div>`;

  if (items.length) {
    html += '<div class="section-subtitle">KBI条目</div>';
    items.forEach(item => {
      const statusColor = item.status === 'applied' ? 'cron-ok' : item.status === 'pending' ? 'cron-warn' : 'cron-unknown';
      const roiColor = item.roi >= 80 ? 'stat-green' : item.roi >= 50 ? 'stat-yellow' : 'stat-purple';
      html += `<div class="kbi-item">
        <span class="kbi-id">${item.id}</span>
        <span class="kbi-roi ${roiColor}">${item.roi}</span>
        <span class="kbi-status ${statusColor}">${item.status}</span>
        <span class="kbi-note">${item.title || ''}</span>
      </div>`;
    });
  }
  if (kbi.lastScan) {
    html += `<div style="margin-top:8px;font-size:12px;color:var(--text-dim);">上次扫描: ${kbi.lastScan}</div>`;
  }
  body.innerHTML = html;

  // Animate stats
  const statsContainer = document.getElementById('kbiStats');
  const stats = [
    { val: kbi.total, label: '总条目', cls: 'stat-blue' },
    { val: kbi.applied, label: '已应用', cls: 'stat-green' },
    { val: kbi.pending, label: '待应用', cls: 'stat-yellow' },
    { val: kbi.discarded, label: '参考/废弃', cls: 'stat-purple' }
  ];
  statsContainer.innerHTML = stats.map((s, i) =>
    `<div class="stat-box"><div class="stat-value ${s.cls}" data-target="${s.val}">0</div><div class="stat-label">${s.label}</div></div>`
  ).join('');
  statsContainer.querySelectorAll('.stat-value').forEach(el => {
    animateCount(el, el.dataset.target, 800);
  });
}

function renderCron(data) {
  const body = document.getElementById('cronBody');
  let html = '';

  // CSS Timeline - last 24h
  html += '<div class="section-subtitle">最近24小时运行时间轴</div>';
  html += `<div class="timeline-wrap">
    <div class="timeline-axis">
      <div class="timeline-line"></div>`;
  CRON_TASKS.forEach((c, i) => {
    const hour = c.runHour || 0;
    const pos = (hour / 24) * 100;
    const color = c.status === 'ok' ? 'var(--green)' : c.status === 'warn' ? 'var(--yellow)' : 'var(--red)';
    html += `<div class="timeline-dot" style="left:${pos}%;background:${color};" data-label="${c.name} ${hour}:00" onclick="toggleCronDetail(${i})"></div>`;
  });
  html += `</div>
    <div class="timeline-labels"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>
  </div>`;

  html += '<div class="section-subtitle" style="margin-top:12px;">任务列表</div>';
  CRON_TASKS.forEach((c, i) => {
    const cls = c.status === 'ok' ? 'cron-ok' : c.status === 'warn' ? 'cron-warn' : c.status === 'error' ? 'cron-error' : 'cron-unknown';
    const icon = c.status === 'ok' ? '✅' : c.status === 'warn' ? '⚠️' : '❌';
    html += `<div class="cron-item" style="cursor:pointer;" onclick="toggleCronDetail(${i})" title="点击展开详情">
      <span style="flex-shrink:0;">${icon}</span>
      <div class="cron-name">${c.name}<div class="cron-time">📅 ${c.schedule}</div></div>
      <span class="cron-time">上次: ${c.lastRun}</span>
      <span class="cron-status ${cls}">${c.status === 'ok' ? '正常' : c.status}</span>
      <span style="color:var(--text-dim);font-size:11px;">→</span>
    </div>`;
    html += `<div id="cronDetail${i}" style="display:none;padding:8px 32px;font-size:12px;color:var(--text-dim);border-bottom:1px solid rgba(15,52,96,0.3);">
      📋 任务名: ${c.name} | ⏰ 调度: ${c.schedule} | 🔄 上次: ${c.lastRun}<br>
      💡 <span style="color:var(--blue);cursor:pointer;" onclick="window.open('file:///C:/Users/Administrator/.qclaw/workspace/HEARTBEAT.md')">查看HEARTBEAT.md</span>
    </div>`;
  });
  body.innerHTML = html;
}

function renderAgent(data) {
  const body = document.getElementById('agentBody');
  let html = '<ul class="agent-list">';
  AGENT_TEAM.forEach((a, i) => {
    const dotClass = a.status === 'active' ? 'agent-active' : a.status === 'ondemand' ? 'agent-ondemand' : 'agent-dormant';
    const tierColor = a.tier === '活跃' ? 'var(--green)' : a.tier === '按需' ? 'var(--yellow)' : 'var(--text-dim)';
    html += `<li class="agent-item" style="cursor:pointer;" onclick="toggleAgentDetail(${i})" title="点击展开详情">
      <span class="agent-dot ${dotClass}"></span>
      <span class="agent-name">${a.name}</span>
      <span class="agent-tag" style="color:${tierColor};">${a.tier}</span>
      <span class="agent-activity">${a.activity}</span>
      <span style="color:var(--text-dim);font-size:11px;">→</span>
    </li>`;
    html += `<div id="agentDetail${i}" style="display:none;padding:8px 32px;font-size:12px;color:var(--text-dim);">
      🤖 Agent: ${a.name} | 📊 状态: ${a.status} | 🎯 职责: ${a.activity}<br>
      💡 <span style="color:var(--blue);cursor:pointer;" onclick="window.open('file:///C:/Users/Administrator/.qclaw/workspace/AGENTS.md')">查看AGENTS.md</span>
    </div>`;
  });
  html += '</ul>';
  body.innerHTML = html;
}

function renderKnowledge(data) {
  const body = document.getElementById('knowledgeBody');
  const k = data.panels.knowledge;
  const s = data.panels.scripts;
  if (!k && !s) { body.innerHTML = '<div class="error-msg">数据不可用</div>'; return; }

  let html = '<div class="stat-row" id="knStats"></div>';
  if (k && k.recentErrors && k.recentErrors.length) {
    html += '<div class="section-subtitle">最近错误</div>';
    k.recentErrors.forEach(e => {
      html += `<div style="font-size:12px;padding:4px 0;color:var(--text-dim);">${e}</div>`;
    });
  }
  if (s && s.list && s.list.length) {
    html += '<div class="section-subtitle">脚本列表</div>';
    s.list.forEach(sc => {
      html += `<div class="kbi-item">
        <span class="kbi-id" style="width:auto;">${sc.name}</span>
        <span class="kbi-note">${(sc.size / 1024).toFixed(1)}KB</span>
      </div>`;
    });
  }
  body.innerHTML = html;

  // Animate stats
  const statsContainer = document.getElementById('knStats');
  const stats = [];
  if (k) {
    stats.push({ val: k.errors, label: '错误记录', cls: 'stat-red' });
    stats.push({ val: k.learnings, label: '学习记录', cls: 'stat-blue' });
  }
  if (s) {
    stats.push({ val: s.total, label: '脚本数', cls: 'stat-green' });
    stats.push({ val: (s.totalSize / 1024).toFixed(0) + 'KB', label: '总大小', cls: 'stat-purple' });
  }
  statsContainer.innerHTML = stats.map(s =>
    `<div class="stat-box"><div class="stat-value ${s.cls}" data-target="${s.val}">0</div><div class="stat-label">${s.label}</div></div>`
  ).join('');
  statsContainer.querySelectorAll('.stat-value').forEach(el => {
    animateCount(el, el.dataset.target, 800);
  });
}

// ======== Helper Functions ========
function scrollToPanel(panelId) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  if (panel.classList.contains('collapsed')) {
    panel.classList.remove('collapsed');
  }
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
  panel.style.boxShadow = '0 0 20px var(--yellow)';
  setTimeout(() => { panel.style.boxShadow = ''; }, 1500);
}

// ======== Helper ========
function statBox(value, label, colorClass) {
  return `<div class="stat-box"><div class="stat-value ${colorClass}">${value}</div><div class="stat-label">${label}</div></div>`;
}

// ======== Detail Functions ========
function showDetail(name, script, cmd) {
  const existing = document.getElementById('detailPopup');
  if (existing) existing.remove();
  const popup = document.createElement('div');
  popup.id = 'detailPopup';
  popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.4);';
  let content = `<h3 style="margin-bottom:12px;color:var(--text);">${name}</h3>`;
  content += `<div style="color:var(--text-dim);font-size:13px;line-height:1.8;">`;
  content += `📎 脚本/文件: <code style="background:rgba(15,52,96,0.5);padding:2px 6px;border-radius:4px;color:var(--blue);">${script}</code><br>`;
  if (cmd && cmd !== 'view') content += `🔧 命令: <code style="background:rgba(15,52,96,0.5);padding:2px 6px;border-radius:4px;color:var(--green);">node ${script} ${cmd}</code><br>`;
  content += `<br><span style="color:var(--text-dim);">路径: .learnings/scripts/${script}</span><br>`;
  content += `</div>`;
  content += `<div style="margin-top:16px;text-align:right;">`;
  content += `<button class="btn-refresh" onclick="document.getElementById('detailPopup').remove()" style="margin-left:8px;">关闭</button>`;
  content += `</div>`;
  popup.innerHTML = content;
  document.body.appendChild(popup);
  popup.addEventListener('click', function(e) { if (e.target === popup) popup.remove(); });
}

function toggleCronDetail(i) {
  const el = document.getElementById('cronDetail' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleAgentDetail(i) {
  const el = document.getElementById('agentDetail' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

loadData(false);
